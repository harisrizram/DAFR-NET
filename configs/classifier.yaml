# configs/classifier.yaml
# Damage Type Classifier — Phase 1

model:
  backbone: resnet50          # swap to vit_small_patch16_224 for ViT
  num_classes: 3              # crack | fade | missing
  pretrained: true
  freeze_backbone_epochs: 5   # fine-tune only head for first 5 epochs

data:
  root: data/processed
  mask_dir: data/masks
  label_csv: data/damage_labels.csv   # generated by prepare_mural_dh.py
  image_size: 256
  train_split: 0.8
  num_workers: 4

training:
  epochs: 50
  batch_size: 32
  lr: 1e-4
  weight_decay: 1e-4
  scheduler: cosine
  warmup_epochs: 3
  loss: cross_entropy

augmentation:
  horizontal_flip: true
  vertical_flip: false
  rotation: 15
  color_jitter: false         # keep mural colors authentic
  random_crop: 224

logging:
  wandb_project: DAFR-Net
  wandb_run: classifier_v1
  log_every_n_steps: 10
  save_top_k: 3

output:
  checkpoint_dir: models/checkpoints/classifier
  export_dir: models/exports
