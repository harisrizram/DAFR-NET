# configs/encoder.yaml
# Dual-Branch Encoder + Inpainting Head — Phase 1

model:
  structure_branch:
    backbone: swin_tiny_patch4_window7_224
    pretrained: true
    out_channels: 256
  frequency_branch:
    fft_norm: ortho
    out_channels: 256
    freq_layers: 4
  fusion:
    type: cross_attention
    num_heads: 8
    dropout: 0.1
    embed_dim: 512
  inpainting_head:
    type: unet
    decoder_channels: [256, 128, 64, 32]
    skip_connections: true

data:
  root: /kaggle/input/datasets/harizram/dafrnet-muraldh/processed
  mask_dir: /kaggle/input/datasets/harizram/dafrnet-muraldh/masks
  target_dir: null                        # no paired clean reference in MuralDH; self-supervised
  image_size: 256
  train_split: 0.8
  num_workers: 4                          # reduce to 0 on Windows if DataLoader hangs
  damage_types: [crack, fade, missing]   # train all jointly; classifier gates at inference

training:
  epochs: 150
  batch_size: 8                          # reduce to 4 if OOM on T4
  lr: 2.0e-4
  weight_decay: 1.0e-4
  scheduler: cosine_with_restarts
  warmup_epochs: 5
  gradient_clip: 1.0
  precision: 16-mixed                    # fp16 for memory efficiency

loss:
  reconstruction: l1                     # pixel-level
  perceptual: vgg16                      # perceptual loss weight
  perceptual_weight: 0                   # disabled for Kaggle Tiny fallback (fp32 VGG16 pass too slow)
  ssim_weight: 0.2
  total: reconstruction + perceptual + ssim

logging:
  wandb_project: DAFR-Net
  wandb_run: encoder_inpaint_v1
  log_images_every_n_epochs: 10
  save_top_k: 5

output:
  checkpoint_dir: /kaggle/working/checkpoints/encoder
  results_dir: /kaggle/working/results/inpainting
  export_dir: /kaggle/working/exports
